    ClientBatchRequest:
      properties:
        jobs:
          items:
            $ref: '#/components/schemas/ClientPredictionJob'
          type: array
          minItems: 1
          title: Jobs
          description: List of prediction jobs
        webhook_url:
          anyOf:
            - type: string
            - type: "null"
          title: Webhook Url
          description: Optional webhook URL for batch completion
        metadata:
          anyOf:
            - additionalProperties: true
              type: object
            - type: "null"
          title: Metadata
          description: Optional metadata for the batch
      type: object
      required:
        - jobs
      title: ClientBatchRequest
      description: Request to create a new batch of prediction jobs - as sent by client.
    ClientPredictionJob:
      properties:
        year:
          type: integer
          maximum: 2025.0
          minimum: 2018.0
          title: Year
          description: Year for prediction
        polygon:
          $ref: '#/components/schemas/GeoJSONPolygon'
          description: GeoJSON polygon for the area
      type: object
      required:
        - year
        - polygon
      title: ClientPredictionJob
      description: Individual prediction job within a batch - as sent by client.
    GeoJSONPolygon:
      properties:
        type:
          type: string
          const: Polygon
          title: Type
          description: GeoJSON geometry type - must be 'Polygon'
          default: Polygon
        coordinates:
          items:
            items:
              items:
                type: number
              type: array
            type: array
          type: array
          title: Coordinates
          description: Array of linear rings, first is exterior, rest are holes
      type: object
      required:
        - coordinates
      title: GeoJSONPolygon
      description: |-
        GeoJSON Polygon with RFC 7946 validation.

        A polygon is represented as an array of linear ring coordinate arrays,
        where the first element represents the exterior ring, and any subsequent
        elements represent interior rings (holes).

        According to RFC 7946:
        - Each ring must have at least 4 positions
        - The first and last positions must be equivalent (ring is closed)
        - Coordinates must be within valid bounds:
          - Longitude: -180 to 180 degrees
          - Latitude: -90 to 90 degrees
